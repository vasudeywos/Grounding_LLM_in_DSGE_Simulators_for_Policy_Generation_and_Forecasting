data:
  train_file: ../data/economic_discourse.jsonl
  validation_file: null
  validation_fraction: 0.2
  max_length: 256
  max_documents: 16
  minimum_documents: 1
  shock_names:
    - technology
    - demand
    - supply
    - expectations
    - inflation
    - monetary
model:
  model_id: bert-base-uncased
  embedding_dimension: 256
  shock_embedding_dimension: 128
  last_hidden_layers: 4
  dropout: 0.1
  freeze_embeddings: false
training:
  output_dir: outputs/semantic_bert
  seed: 42
  epochs: 10
  batch_size: 4
  learning_rate: 0.00002
  weight_decay: 0.01
  warmup_fraction: 0.1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  patience: 3
  shock_loss_weight: 1.0
  volatility_loss_weight: 0.5
  contrastive_loss_weight: 0.2
  contrastive_temperature: 0.07
  mixed_precision: bf16
  num_workers: 0

